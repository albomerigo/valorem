<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0A0812" />
      <stop offset="100%" stop-color="#14102A" />
    </linearGradient>

    <linearGradient id="v-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#A88BFA" />
      <stop offset="50%" stop-color="#E879F9" />
      <stop offset="100%" stop-color="#60A5FA" />
    </linearGradient>

    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="512" height="512" rx="104" fill="url(#bg)" />

  <circle cx="180" cy="180" r="180" fill="#A88BFA" opacity="0.15" />
  <circle cx="380" cy="340" r="140" fill="#E879F9" opacity="0.1" />

  <text x="256" y="360"
        text-anchor="middle"
        font-family="'Fraunces', 'Times New Roman', Georgia, serif"
        font-style="italic"
        font-weight="500"
        font-size="380"
        fill="url(#v-grad)"
        filter="url(#glow)">v</text>
</svg>